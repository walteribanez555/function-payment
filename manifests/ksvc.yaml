apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: function-payment
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containers:
        - image: ghcr.io/walteribanez555/function-payment:362b6683c9f79ebf67fc086bb3ac92382ce61837
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"